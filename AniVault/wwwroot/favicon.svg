<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#0d1117"/>
  <!-- Outer diamond -->
  <polygon points="32,5 59,32 32,59 5,32" fill="none" stroke="#e6b450" stroke-width="3"/>
  <!-- Inner diamond fill -->
  <polygon points="32,15 49,32 32,49 15,32" fill="#e6b450" opacity="0.12"/>
  <!-- A — y=30 -->
  <text x="32" y="30" font-family="Georgia,serif" font-size="24" font-weight="bold"
        fill="#e6b450" text-anchor="middle" alignment-baseline="central">A</text>
  <!-- Corner accent dots -->
  <circle cx="32" cy="5"  r="2.5" fill="#e6b450"/>
  <circle cx="32" cy="59" r="2.5" fill="#e6b450"/>
  <circle cx="5"  cy="32" r="2.5" fill="#e6b450"/>
  <circle cx="59" cy="32" r="2.5" fill="#e6b450"/>
</svg>
